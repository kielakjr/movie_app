name: movie_app

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ${DB_CONTAINER_NAME:-movie_app_db}
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-movie_app}
      POSTGRES_USER: ${POSTGRES_USER:-movie_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-movie_app}

    ports:
      - "${DB_PORT:-5432}:5432"

    volumes:
      - movie_app_db:/var/lib/postgresql/data

volumes:
  movie_app_db:
