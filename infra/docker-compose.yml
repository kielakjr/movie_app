name: movie_app

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ${DB_CONTAINER_NAME:-movie_app_db}
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-movie_app}
      POSTGRES_USER: ${POSTGRES_USER:-movie_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-movie_app}

    ports:
      - "${DB_PORT:-5432}:5432"

    volumes:
      - movie_app_db:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: ${REDIS_CONTAINER_NAME:-movie_app_redis}
    restart: unless-stopped

    ports:
      - "${REDIS_PORT:-6379}:6379"

  embedding:
    build:
      context: ../embedding-service
    container_name: ${EMBEDDING_CONTAINER_NAME:-movie_app_embedding}
    restart: unless-stopped

    ports:
      - "${EMBEDDING_PORT:-8000}:8000"

    volumes:
      - embedding_model_cache:/root/.cache/huggingface

volumes:
  movie_app_db:
  embedding_model_cache:
