server:
  port: 8080
  servlet:
    session:
      cookie:
        name: MOVIE_APP_SESSION
        http-only: true
        same-site: Lax

spring:
  application:
    name: movie_app

  jackson:
    property-naming-strategy: SNAKE_CASE

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/movie_app}
    username: ${DB_USERNAME:movie_app}
    password: ${DB_PASSWORD:movie_app}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

  session:
    store-type: redis
    timeout: 1800
    redis:
      save-mode: always

embedding:
  base-url: ${EMBEDDING_BASE_URL:http://localhost:8000}

tmdb:
  api-key: ${TMDB_API_KEY}
  base-url: "https://api.themoviedb.org/3"
  images:
    poster-base-url: "https://image.tmdb.org/t/p/w500"
    backdrop-base-url: "https://image.tmdb.org/t/p/w780"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
