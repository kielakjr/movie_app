server:
  servlet:
    session:
      cookie:
        name: MOVIE_APP_SESSION
        http-only: true
        same-site: Lax
        secure: false

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE

cors:
  allowed-origins: http://localhost:5173

tmdb:
  api-key: test-key-for-integration-tests
  base-url: http://localhost:9999
  images:
    poster-base-url: https://image.tmdb.org/t/p/w500
    backdrop-base-url: https://image.tmdb.org/t/p/w780

embedding:
  base-url: http://localhost:8000
